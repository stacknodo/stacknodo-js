name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'stacknodo/stacknodo-js'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate package contents
        run: npm run pack:check

      - name: Read package metadata
        id: package
        run: |
          node --input-type=commonjs <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          NODE

      - name: Check whether version already exists on npm
        id: npm
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          node --input-type=commonjs <<'NODE' >> "$GITHUB_OUTPUT"
          const https = require('node:https');

          const name = process.env.PACKAGE_NAME;
          const version = process.env.PACKAGE_VERSION;
          const url = `https://registry.npmjs.org/${encodeURIComponent(name)}/${version}`;

          https
            .get(url, (response) => {
              response.resume();

              if (response.statusCode === 200) {
                console.log('published=true');
                return;
              }

              if (response.statusCode === 404) {
                console.log('published=false');
                return;
              }

              console.error(`Unexpected npm registry response: ${response.statusCode}`);
              process.exit(1);
            })
            .on('error', (error) => {
              console.error(error);
              process.exit(1);
            });
          NODE

      - name: Skip already-published version
        if: steps.npm.outputs.published == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already on npm. Skipping publish."

      - name: Publish package
        if: steps.npm.outputs.published != 'true'
        run: npm publish --access public